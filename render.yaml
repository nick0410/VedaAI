services:
  - type: web
    name: vedaai-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_MODEL
        value: openai/gpt-oss-120b
      - key: JWT_EXPIRES_IN
        value: 7d
      # Secrets — set these manually in the Render dashboard:
      - key: MONGO_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      # Set this to your Vercel URL after frontend deploys.
      # Comma-separated origins are allowed.
      - key: CORS_ORIGIN
        sync: false
